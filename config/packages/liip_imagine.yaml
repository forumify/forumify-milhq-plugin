liip_imagine:
    filter_sets:
        milhq_small:
            filters:
                thumbnail: { size: [64, 64], mode: inset }
        milhq_large:
            filters:
                thumbnail: { size: [300, 300], mode: inset }
        milhq_uniform:
            filters:
                downscale: { max: [2000, 530], mode: inset }
        milhq_signature:
            filters:
                downscale: { max: [1200, 600], mode: inset }
